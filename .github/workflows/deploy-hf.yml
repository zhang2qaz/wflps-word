name: Deploy to HF Space

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force \
            "https://zyytc999:${HF_TOKEN}@huggingface.co/spaces/zyytc999/moxie-dashi" \
            HEAD:main
